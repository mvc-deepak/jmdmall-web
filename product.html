<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Details - JMD Mall</title>
<link rel="stylesheet" href="css/style.css">

<style>
/* Standardized product detail spacing and Flipkart/Amazon-like buttons/icons */
.product-page{
    max-width:1400px;
    margin:28px auto;
    padding:24px;
}

.product-detail-card{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:32px;
    background:#fff;
    padding:28px;
    border-radius:12px;
    box-shadow:0 6px 20px rgba(0,0,0,.06);
}

/* Gallery styles - larger main image with neutral background */
.gallery-column{
    display:flex;
    flex-direction:column;
    gap:14px;
}
.main-image-wrap{
    position:relative;
    background:#fff;
    border-radius:8px;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    border:1px solid var(--border-color);
}
.main-image-wrap img{
    width:100%;
    height:480px;
    object-fit:contain;
    background:#fff;
}
.gallery-thumbs{
    display:flex;
    gap:10px;
    overflow-x:auto;
    padding-top:8px;
}
.thumb{
    width:72px;
    height:72px;
    flex:0 0 auto;
    border-radius:6px;
    overflow:hidden;
    border:2px solid transparent;
    cursor:pointer;
}
.thumb img{
    width:100%;
    height:100%;
    object-fit:cover;
}
.thumb.active{ border-color:#ff9900; }

/* nav arrows */
.nav-arrow{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:rgba(0,0,0,0.45);
    color:#fff;
    border:none;
    width:40px;
    height:40px;
    border-radius:50%;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
}
.nav-left{ left:12px; }
.nav-right{ right:12px; }

/* Details column */
.details-column{ padding:8px; }
.details-column h1{
    font-size:1.65rem;
    margin:6px 0 8px 0;
    line-height:1.15;
}

.product-meta{
    display:flex;
    align-items:center;
    gap:12px;
    color:var(--text-light);
    font-size:0.95rem;
}

/* Price row - inline MRP, selling price, discount percent and rating */
.price-row{
    display:flex;
    align-items:baseline;
    gap:10px;
    margin-top:12px;
}

.mrp{
    text-decoration:line-through;
    color:#777;
    font-size:0.95rem;
}

.sell-price{
    font-size:28px;
    font-weight:800;
    color:#e63946;
}

.discount-percent{
    font-size:0.95rem;
    color:#388e3c;
    font-weight:700;
    background:rgba(56,142,60,0.08);
    padding:4px 8px;
    border-radius:6px;
}

/* Flat rupee-off small pill near price */
.flat-discount-pill{
    font-size:0.85rem;
    background:#28a745;
    color:#fff;
    padding:6px 8px;
    border-radius:6px;
    font-weight:700;
}

/* Action buttons - standard look */
.cta-group{
    display:flex;
    gap:12px;
    margin-top:18px;
    align-items:center;
}

.whatsapp-btn, .cart-btn, .share-btn{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:12px 16px;
    border-radius:6px;
    font-weight:700;
    cursor:pointer;
    border:none;
    text-decoration:none;
    color:#fff;
}

.whatsapp-btn{ background:#25D366; }
.cart-btn{ background:#146EB4; }
.share-btn{ background:transparent; color:var(--text-dark); border:1px solid var(--border-color); padding:10px 12px; font-weight:600; }

/* Assured box and detail table spacing */
.detail-table{ margin-top:20px; display:grid; gap:10px; }
.detail-table div{ padding:8px 0; border-bottom:1px solid #f1f1f1; }
.assured-box{ margin-top:20px; padding:16px; background:#f8f9fa; border-radius:8px; }

/* Rating small star icon */
.star{ color:#f39c12; margin-right:6px; }

/* Responsive adjustments */
@media(max-width:900px){
    .product-detail-card{ grid-template-columns:1fr; }
    .main-image-wrap img{ height:360px; }
    .thumb{ width:64px; height:64px; }
}
@media(max-width:480px){
    .main-image-wrap img{ height:240px; }
    .thumb{ width:52px; height:52px; }
    .details-column h1{ font-size:1.25rem; }
    .sell-price{ font-size:22px; }
}

</style>

</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <div class="nav-logo">
            <a href="index.html">JMD Mall</a>
        </div>
    </div>
</nav>

<main class="product-page">

<div id="productContainer">Loading Product...</div>

</main>

<script>
const CSV_URL = 'products.csv';
const WHATSAPP = '9779705446407';
const PLACEHOLDER = 'images/placeholder.svg';

async function loadProduct(){
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    try{
        const res = await fetch(CSV_URL);
        if(!res.ok) throw new Error('CSV not found');
        const csv = await res.text();
        const products = parseCSV(csv);
        const product = products.find(p=>p.id===id);
        if(!product){
            document.getElementById('productContainer').innerHTML = '<h2>Product Not Found</h2>';
            return;
        }
        renderProduct(product);
    }catch(err){
        console.error(err);
        document.getElementById('productContainer').innerHTML = '<h2>Unable to load product</h2>';
    }
}

// robust CSV parsing helpers (handles quoted fields)
function parseCSV(csvText){
    const lines = csvText.trim().split(/\r?\n/).filter(Boolean);
    if(!lines.length) return [];

    const headers = parseCSVLine(lines[0]).map(h=>h.trim());
    const data = [];

    for(let i=1;i<lines.length;i++){
        if(!lines[i].trim()) continue;
        const values = parseCSVLine(lines[i]);
        const obj = {};
        headers.forEach((h,idx)=>{
            obj[h] = values[idx] ? values[idx].trim() : '';
        });
        // build images array
        const images = [];
        if(obj.main_image) images.push(obj.main_image);
        ['img2','img3','img4','img5','img6'].forEach(k=>{ if(obj[k] && obj[k].trim()) images.push(obj[k].trim()); });
        if(obj.image && !images.length) images.push(obj.image);
        obj.images = images;
        obj.image = images[0] || obj.image || PLACEHOLDER;
        data.push(obj);
    }
    return data;
}

    let cur = '';
    let inQuotes = false;
    for(let i=0;i<line.length;i++){
        const ch = line[i];
        if(ch==='
